name: Deploy SkyLink Frontend

on:
  push:
    branches:
      - main
    paths:
      - "skylink-web/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: skylink-web/package-lock.json

      - name: Install dependencies
        working-directory: skylink-web
        run: npm install

      - name: Build frontend
        working-directory: skylink-web
        env:
          VITE_BASE_PATH: /SkyLink/
        run: npm run build

      - name: Support client-side routing
        run: cp skylink-web/dist/index.html skylink-web/dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: skylink-web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
